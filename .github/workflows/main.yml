---
name: ⬇️  01- Download from url

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: 'Password for zip files (optional)'
        required: false
        default: ''
        type: string

jobs:
  save-file:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          # Configure git for better large file handling
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "Git configured for large file handling"

      - name: Install aria2 and zip
        run: |
          sudo apt-get update
          # FIX: Added p7zip-full for reliable cross-platform archives (replaces zip for split/password use)
          sudo apt-get install -y aria2 zip curl bc

      - name: AVASAM Downloader - https://avasam.ir
        run: |
          echo "🏷️  AVASAM - Your Download Solution"
          echo "🌐 https://avasam.ir"
          echo ""

      - name: Download files
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"

          # REDUCED to 45MB for faster, more reliable pushes
          SPLIT_THRESHOLD_MB=90
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          # Create safe backup location for files (survives git operations)
          BACKUP_DIR="/tmp/download_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt

          echo "AVASAM (https://avasam.ir) - Downloading with mode: $MODE"
          echo "Split threshold: $SPLIT_THRESHOLD_MB MB (optimized for GitHub)"
          echo "Backup directory: $BACKUP_DIR"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "Password protection: ENABLED"
          else
            echo "Password protection: DISABLED"
          fi

          mkdir -p downloads tmp_downloads

          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain")

          get_random_word() {
            echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"
          }

          get_unique_folder() {
            local BASE_PATH="$1"
            local NAME="$2"
            # Check both in downloads and backup dir
            if [ ! -d "$BASE_PATH/$NAME" ] && [ ! -d "$BACKUP_DIR/$NAME" ]; then
              echo "$NAME"
              return
            fi
            local RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${RANDOM_SUFFIX}" ] || [ -d "$BACKUP_DIR/${NAME}_${RANDOM_SUFFIX}" ]; do
              RANDOM_SUFFIX=$(get_random_word)
            done
            echo "${NAME}_${RANDOM_SUFFIX}"
          }

          # Function for proper URL encoding
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          create_error_file() {
            local FILENAME="$1"
            local ERROR_MSG="$2"
            local URL="$3"
            local BASENAME_NO_EXT="${FILENAME%.*}"
            local FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$BASENAME_NO_EXT")
            mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
            {
              echo "# ${FILENAME} - Download Failed"
              echo ""
              echo "---"
              echo ""
              echo "## Download Information"
              echo ""
              echo "| Property | Value |"
              echo "|----------|-------|"
              echo "| **File** | \`${FILENAME}\` |"
              echo "| **URL** | ${URL} |"
              echo "| **Date** | $(date '+%Y-%m-%d %H:%M:%S UTC') |"
              echo "| **Status** | **FAILED** |"
              echo ""
              echo "---"
              echo ""
              echo "## Error Details"
              echo ""
              echo "\`\`\`"
              echo "$ERROR_MSG"
              echo "\`\`\`"
              echo ""
              echo "---"
              echo ""
              echo "## Possible Solutions"
              echo ""
              echo "- Check if the URL is correct and accessible"
              echo "- The file may have been removed or moved"
              echo "- The server may require authentication"
              echo "- For SourceForge: Try using the direct download link"
              echo "- Some servers block automated downloads (403 Forbidden)"
              echo "- Try again later if it is a temporary server issue"
              echo ""
              echo "---"
              echo ""
              echo "*This tool created by [avasam.ir](https://avasam.ir)*"
            } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
            echo "Error file created: $BACKUP_DIR/$FOLDER_NAME/README.md"
          }

          download_with_retry() {
            local URL="$1"
            local FILENAME="$2"
            local MAX_RETRIES=3
            local RETRY_DELAY=5
            local SUCCESS=false
            local ERROR_LOG=""

            # Clean up any previous partial download
            rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"

            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt of $MAX_RETRIES for $FILENAME"

              # Clean before each attempt
              rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"

              ERROR_LOG=$(aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=20M \
                --max-tries=3 \
                --retry-wait=5 \
                --timeout=60 \
                --connect-timeout=30 \
                --follow-torrent=false \
                --check-certificate=false \
                --allow-overwrite=true \
                --auto-file-renaming=false \
                --dir="tmp_downloads" \
                --out="$FILENAME" \
                "$URL" 2>&1)

              # Check if download was successful AND file has content
              if [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
                local FILE_SIZE=$(stat -c%s "tmp_downloads/$FILENAME" 2>/dev/null || echo "0")
                if [ "$FILE_SIZE" -gt 0 ]; then
                  SUCCESS=true
                  echo "aria2c download successful: $FILENAME (${FILE_SIZE} bytes)"
                  break
                fi
              fi

              # aria2c failed, clean up and try curl
              rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"
              echo "aria2c failed or file empty, trying curl fallback..."

              ERROR_LOG=$(curl -L -f -# \
                --retry 3 \
                --retry-delay 5 \
                --connect-timeout 30 \
                --max-time 3600 \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                -o "tmp_downloads/$FILENAME" \
                "$URL" 2>&1)

              # Check curl result
              if [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
                local FILE_SIZE=$(stat -c%s "tmp_downloads/$FILENAME" 2>/dev/null || echo "0")
                if [ "$FILE_SIZE" -gt 0 ]; then
                  SUCCESS=true
                  echo "curl download successful: $FILENAME (${FILE_SIZE} bytes)"
                  break
                fi
              fi

              # Both failed, clean up
              rm -f "tmp_downloads/$FILENAME"
              echo "Attempt $attempt failed. Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            done

            if [ "$SUCCESS" = true ] && [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
              local FINAL_SIZE=$(stat -c%s "tmp_downloads/$FILENAME" 2>/dev/null || echo "0")
              if [ "$FINAL_SIZE" -gt 0 ]; then
                echo "Successfully downloaded: $FILENAME ($FINAL_SIZE bytes)"
                return 0
              fi
            fi

            # Download failed - create error file and clean up
            rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"
            create_error_file "$FILENAME" "Download failed after $MAX_RETRIES attempts. Last error: $ERROR_LOG" "$URL"
            return 1
          }

          for URL in $URLS; do
            FILENAME=$(basename "$URL" | sed 's/%20/ /g' | sed 's/%2F/-/g' | sed 's/[?#].*//')
            FILENAME=$(echo "$FILENAME" | sed 's/[<>:"|?*]/_/g')
            echo "Downloading $URL -> $FILENAME"
            download_with_retry "$URL" "$FILENAME" || echo "Failed to download: $FILENAME"
          done

          if [ "$MODE" = "zip" ]; then
            if [ -n "$(ls -A tmp_downloads 2>/dev/null)" ]; then
              ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S)"
              FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$ARCHIVE_NAME")
              mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
              echo "Creating archive in folder: $BACKUP_DIR/$FOLDER_NAME"

              # Validate files before archiving
              VALID_FILES=()
              for f in tmp_downloads/*; do
                if [ -f "$f" ] && [ -s "$f" ]; then
                  VALID_FILES+=("$f")
                else
                  echo "Skipping empty or invalid file: $f"
                fi
              done

              if [ ${#VALID_FILES[@]} -gt 0 ]; then
                # Use standard zip split volumes: file.zip, file.z01, file.z02 ...
                # Compatible with WinRAR, 7-Zip, Ark (Linux), Windows Explorer
                ARCHIVE_PATH="$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}.zip"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m \
                    "${ARCHIVE_PATH}" \
                    "${VALID_FILES[@]}"
                else
                  zip -j -s ${SPLIT_THRESHOLD_MB}m \
                    "${ARCHIVE_PATH}" \
                    "${VALID_FILES[@]}"
                fi

                # Verify archive was created and has content
                if [ ! -s "${ARCHIVE_PATH}" ] && [ -z "$(ls "$BACKUP_DIR/$FOLDER_NAME/"*.z[0-9]* 2>/dev/null)" ]; then
                  echo "ERROR: Archive file is empty or not created!"
                  rm -f "$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}".*
                else
                  # Build download links for all parts
                  FOLDER_ENCODED=$(urlencode "${FOLDER_NAME}")
                  DOWNLOAD_LINKS_MD=""
                  LINK_NUM=0
                  TOTAL_ARCHIVE_SIZE=0
                  for part_file in $(ls "$BACKUP_DIR/$FOLDER_NAME/"*.zip "$BACKUP_DIR/$FOLDER_NAME/"*.z[0-9]* 2>/dev/null | sort); do
                    [ -f "$part_file" ] || continue
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(urlencode "${PART_BASENAME}")
                    RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                    LINK_NUM=$((LINK_NUM + 1))
                    DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                    PART_SIZE=$(stat -c%s "$part_file" 2>/dev/null || echo 0)
                    TOTAL_ARCHIVE_SIZE=$((TOTAL_ARCHIVE_SIZE + PART_SIZE))
                  done
                  ARCHIVE_SIZE_MB=$(echo "scale=2; $TOTAL_ARCHIVE_SIZE / 1024 / 1024" | bc)

                  {
                    echo "# ${ARCHIVE_NAME} Archive"
                    echo ""
                    echo "---"
                    echo ""
                    echo "## Download Information"
                    echo ""
                    echo "| Property | Value |"
                    echo "|----------|-------|"
                    echo "| **Archive Name** | \`${ARCHIVE_NAME}.zip\` |"
                    echo "| **Total Size** | ${ARCHIVE_SIZE_MB} MB (${LINK_NUM} parts) |"
                    echo "| **Status** | **Complete (100%)** |"
                    if [ -n "$ZIP_PASSWORD" ]; then
                      echo "| **Password Protected** | **YES** |"
                    else
                      echo "| **Password Protected** | **NO** |"
                    fi
                    echo ""
                    echo "---"
                    echo ""
                    echo "## Download Links"
                    echo ""
                    echo "| # | File | Link |"
                    echo "|---|------|------|"
                    printf '%s' "${DOWNLOAD_LINKS_MD}"
                    echo ""
                    echo "---"
                    echo ""
                    echo "## How to Extract"
                    echo ""
                    echo "1. **Download all parts** (\`.zip\`, \`.z01\`, \`.z02\`...)"
                    echo "2. **Open** \`${ARCHIVE_NAME}.zip\` with WinRAR, 7-Zip, Ark, or any standard zip tool"
                    echo "3. **Extract** — all parts combine automatically"
                    if [ -n "$ZIP_PASSWORD" ]; then
                      echo "4. Enter the password when prompted"
                    fi
                    echo ""
                    echo "---"
                    echo ""
                    echo "*This tool created by [avasam.ir](https://avasam.ir)*"
                  } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
                fi
              else
                echo "No valid files to archive!"
              fi
            fi
            rm -rf tmp_downloads
          else
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue

              # CRITICAL: Verify file has content before processing
              if [ ! -s "$FILE" ]; then
                echo "WARNING: Skipping empty file: $FILE"
                rm -f "$FILE"
                continue
              fi

              SIZE=$(stat -c%s "$FILE")

              # Double-check size is valid
              if [ "$SIZE" -le 0 ]; then
                echo "WARNING: File has zero or invalid size: $FILE"
                rm -f "$FILE"
                continue
              fi

              BASENAME=$(basename "$FILE")
              BASENAME_NO_EXT="${BASENAME%.*}"
              EXT="${BASENAME##*.}"

              FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$BASENAME_NO_EXT")
              mkdir -p "$BACKUP_DIR/$FOLDER_NAME"

              FOLDER_ENCODED=$(urlencode "${FOLDER_NAME}")

              if [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "$BASENAME is $(( SIZE / 1024 / 1024 ))MB - splitting into ${SPLIT_THRESHOLD_MB}MB parts"

                # Use standard zip split volumes: file.zip, file.z01, file.z02 ...
                # Compatible with WinRAR, 7-Zip, Ark (Linux), Windows Explorer
                ARCHIVE_BASE="$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}"

                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m \
                    "${ARCHIVE_BASE}.zip" \
                    "$FILE"
                else
                  zip -j -s ${SPLIT_THRESHOLD_MB}m \
                    "${ARCHIVE_BASE}.zip" \
                    "$FILE"
                fi

                PARTS_COUNT=$(ls "$BACKUP_DIR/${FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | wc -l)
                echo "Parts created in folder $BACKUP_DIR/$FOLDER_NAME: $PARTS_COUNT files"

                # Verify at least one part was created
                if [ "$PARTS_COUNT" -eq 0 ]; then
                  echo "ERROR: No archive parts were created for $BASENAME"
                  continue
                fi

                # Calculate total size
                TOTAL_SIZE=0
                for part_file in "$BACKUP_DIR/${FOLDER_NAME}"/*; do
                  if [ -f "$part_file" ]; then
                    PART_SIZE=$(stat -c%s "$part_file" 2>/dev/null || echo 0)
                    TOTAL_SIZE=$((TOTAL_SIZE + PART_SIZE))
                  fi
                done
                TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)

                # Build download links for all parts
                DOWNLOAD_LINKS_MD=""
                LINK_NUM=0
                for part_file in $(ls "$BACKUP_DIR/${FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | sort); do
                  if [ -f "$part_file" ]; then
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(urlencode "${PART_BASENAME}")
                    RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                    LINK_NUM=$((LINK_NUM + 1))
                    DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                  fi
                done

                README_FILE="$BACKUP_DIR/${FOLDER_NAME}/README.md"
                {
                  printf '%s\n' "# ${BASENAME_NO_EXT}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Information"
                  printf '%s\n' ""
                  printf '%s\n' "| Property | Value |"
                  printf '%s\n' "|----------|-------|"
                  printf '%s\n' "| **Original File** | \`${BASENAME}\` |"
                  printf '%s\n' "| **Total Size** | **${PARTS_COUNT} parts** - **${TOTAL_SIZE_MB} MB** |"
                  printf '%s\n' "| **Status** | **Complete (100%)** |"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "| **Password Protected** | **YES** |"
                  else
                    printf '%s\n' "| **Password Protected** | **NO** |"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Links"
                  printf '%s\n' ""
                  printf '%s\n' "| # | File | Link |"
                  printf '%s\n' "|---|------|------|"
                  printf '%s' "${DOWNLOAD_LINKS_MD}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## How to Extract"
                  printf '%s\n' ""
                  printf '%s\n' "1. **Download all parts** (\`.zip\`, \`.z01\`, \`.z02\`...)"
                  printf '%s\n' "2. **Open** \`${FOLDER_NAME}.zip\` with WinRAR, 7-Zip, Ark, or any standard zip tool"
                  printf '%s\n' "3. **Extract** — all parts combine automatically"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "4. Enter the password when prompted"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                } > "$README_FILE"

                echo "Created README.md for split archive"

              else
                echo "$BASENAME - creating zip archive in folder: $BACKUP_DIR/$FOLDER_NAME"

                # Standard zip archive, openable by any zip tool
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" \
                    "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.zip" \
                    "$FILE"
                else
                  zip -j \
                    "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.zip" \
                    "$FILE"
                fi

                # Verify archive was created successfully
                if [ ! -s "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.zip" ]; then
                  echo "ERROR: Failed to create archive for $BASENAME"
                  rm -f "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.zip"
                  continue
                fi

                SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                FILE_ENCODED=$(urlencode "${FOLDER_NAME}.zip")
                RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${FILE_ENCODED}"

                README_FILE="$BACKUP_DIR/${FOLDER_NAME}/README.md"
                {
                  printf '%s\n' "# ${BASENAME_NO_EXT}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Information"
                  printf '%s\n' ""
                  printf '%s\n' "| Property | Value |"
                  printf '%s\n' "|----------|-------|"
                  printf '%s\n' "| **Original File** | \`${BASENAME}\` |"
                  printf '%s\n' "| **Size** | ${SIZE_MB} MB |"
                  printf '%s\n' "| **Status** | **Complete (100%)** |"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "| **Password Protected** | **YES** |"
                  else
                    printf '%s\n' "| **Password Protected** | **NO** |"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Link"
                  printf '%s\n' ""
                  printf '%s\n' "| File | Link |"
                  printf '%s\n' "|------|------|"
                  printf '%s\n' "| \`${FOLDER_NAME}.zip\` | [Download](${RAW_LINK}) |"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## How to Extract"
                  printf '%s\n' ""
                  printf '%s\n' "1. **Open** \`${FOLDER_NAME}.zip\` with WinRAR, 7-Zip, Ark, or any standard zip tool"
                  printf '%s\n' "2. **Extract** the file"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "3. Enter the password when prompted"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "*This tool created by [avasam.ir](https://avasam.ir)*"
                } > "$README_FILE"

                echo "Created zip archive and README.md"
              fi
            done
            rm -rf tmp_downloads
          fi

          # Debug: Show backup contents
          echo ""
          echo "===== Backup folder contents ====="
          find "$BACKUP_DIR" -type f | head -50

      - name: Update README.md with download links
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"

          # Copy backup files to downloads folder
          mkdir -p downloads
          if [ -d "$BACKUP_DIR" ] && [ "$(ls -A $BACKUP_DIR 2>/dev/null)" ]; then
            cp -r "$BACKUP_DIR"/* downloads/
          fi

          FOLDERS=$(find downloads -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort)

          if [ -z "$FOLDERS" ]; then
            echo "No folders found in downloads"
            exit 0
          fi

          # Function for URL encoding
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          # Create README.md inside downloads folder with list of downloaded files
          {
            echo "# Downloaded list :"
            echo ""
            echo "$FOLDERS" | while read -r FOLDER; do
              if [ -n "$FOLDER" ]; then
                FOLDER_ENCODED=$(urlencode "${FOLDER}")
                echo "- [${FOLDER}](./${FOLDER_ENCODED})"
              fi
            done
            echo ""
            echo "---"
            echo ""
            echo "*This tool created by [avasam.ir](https://avasam.ir)*"
          } > "downloads/README.md"

          echo "downloads/README.md created with list of downloaded files"

          # Update root README.md
          SECTION_TITLE="فایل های دانلود شده در گیتهاب شما :"

          if [ ! -f "README.md" ]; then
            echo "# AVASAM Downloader" > README.md
            echo "" >> README.md
            echo "https://avasam.ir" >> README.md
            echo "" >> README.md
          fi

          if grep -q "$SECTION_TITLE" README.md; then
            sed -i "/$SECTION_TITLE/,/^---$/d" README.md
            sed -i '${/^$/d;}' README.md
          fi

          {
            echo ""
            echo "---"
            echo ""
            echo "## $SECTION_TITLE"
            echo ""
            COUNTER=1
            echo "$FOLDERS" | while read -r FOLDER; do
              if [ -n "$FOLDER" ]; then
                FOLDER_ENCODED=$(urlencode "${FOLDER}")
                echo "${COUNTER}. [$FOLDER]($REPO_URL/$FOLDER_ENCODED)"
                echo ""
                COUNTER=$((COUNTER + 1))
              fi
            done
            echo "---"
          } >> README.md

          echo "README.md updated with download links"

      - name: Incremental Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          echo "AVASAM (https://avasam.ir) - Incremental Push Mode"
          echo "This method pushes files in batches to avoid timeout issues"
          echo ""

          # Check backup has files
          BACKUP_FILE_COUNT=$(find "$BACKUP_DIR" -type f 2>/dev/null | wc -l)
          echo "Total files to push: $BACKUP_FILE_COUNT"

          if [ "$BACKUP_FILE_COUNT" -eq 0 ]; then
            echo "No files in backup directory, checking downloads folder..."
            DOWNLOAD_FILE_COUNT=$(find downloads -type f 2>/dev/null | wc -l)
            if [ "$DOWNLOAD_FILE_COUNT" -eq 0 ]; then
              echo "Nothing to push"
              exit 0
            fi
          fi

          # Function for URL encoding
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          # Function to regenerate master README from all folders
          regenerate_downloads_readme() {
            DOWNLOADS_README="downloads/README.md"

            echo "Regenerating downloads README..."

            # Start fresh README
            {
              echo "# Downloaded list :"
              echo ""
            } > "$DOWNLOADS_README"

            # Add all existing download folders
            for folder in downloads/*/; do
              [ -d "$folder" ] || continue
              FOLDER_NAME=$(basename "$folder")

              # Skip if it's not a valid folder (check for README.md inside)
              [ -f "$folder/README.md" ] || continue

              FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
              printf -- "- [%s](./%s)\n" "$FOLDER_NAME" "$FOLDER_ENCODED" >> "$DOWNLOADS_README"
            done

            {
              echo ""
              echo "---"
              echo ""
              echo "*This tool created by [avasam.ir](https://avasam.ir)*"
            } >> "$DOWNLOADS_README"

            echo "Downloads README regenerated"
          }

          # Function to push files in small batches
          push_batch() {
            local BATCH_SIZE=3  # Push 3 files at a time (about 135MB with 45MB splits)
            local FILES=("$@")
            local BATCH_COUNT=0
            local BATCH_FILES=()
            local TOTAL_PUSHED=0
            local TOTAL_FILES=${#FILES[@]}

            for FILE in "${FILES[@]}"; do
              BATCH_FILES+=("$FILE")
              BATCH_COUNT=$((BATCH_COUNT + 1))

              if [ $BATCH_COUNT -ge $BATCH_SIZE ]; then
                TOTAL_PUSHED=$((TOTAL_PUSHED + BATCH_COUNT))
                echo ""
                echo ">>> Pushing batch ($TOTAL_PUSHED/$TOTAL_FILES files)..."

                # Fetch and reset to latest
                git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                git reset --hard origin/"$BRANCH" 2>/dev/null || true

                # Re-copy all backup files
                mkdir -p downloads
                cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true

                # Add batch files
                for BF in "${BATCH_FILES[@]}"; do
                  git add "$BF" 2>/dev/null || true
                done

                # Commit batch
                if ! git diff --cached --quiet 2>/dev/null; then
                  git commit -m "[AVASAM] Add batch of $BATCH_COUNT files [skip ci]" --quiet 2>/dev/null || true

                  # Push with retries and timeout
                  local PUSH_RETRY=0
                  local PUSH_SUCCESS=false
                  while [ $PUSH_RETRY -lt 5 ]; do
                    PUSH_RETRY=$((PUSH_RETRY + 1))
                    if timeout 180 git push origin HEAD:"$BRANCH" 2>&1; then
                      PUSH_SUCCESS=true
                      echo "    Batch pushed successfully!"
                      break
                    else
                      echo "    Batch push failed, attempt $PUSH_RETRY/5..."
                      git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                      git reset --hard origin/"$BRANCH" 2>/dev/null || true
                      mkdir -p downloads
                      cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
                      for BF in "${BATCH_FILES[@]}"; do
                        git add "$BF" 2>/dev/null || true
                      done
                      if ! git diff --cached --quiet 2>/dev/null; then
                        git commit -m "[AVASAM] Add batch of $BATCH_COUNT files [skip ci]" --quiet 2>/dev/null || true
                      fi
                      sleep $((3 + RANDOM % 7))
                    fi
                  done

                  if [ "$PUSH_SUCCESS" = false ]; then
                    echo "    WARNING: Batch push failed after 5 attempts"
                  fi
                fi

                BATCH_FILES=()
                BATCH_COUNT=0
                sleep 2
              fi
            done

            # Push remaining files
            if [ ${#BATCH_FILES[@]} -gt 0 ]; then
              TOTAL_PUSHED=$((TOTAL_PUSHED + ${#BATCH_FILES[@]}))
              echo ""
              echo ">>> Pushing final batch ($TOTAL_PUSHED/$TOTAL_FILES files)..."

              git fetch origin "$BRANCH" --quiet 2>/dev/null || true
              git reset --hard origin/"$BRANCH" 2>/dev/null || true
              mkdir -p downloads
              cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true

              for BF in "${BATCH_FILES[@]}"; do
                git add "$BF" 2>/dev/null || true
              done

              if ! git diff --cached --quiet 2>/dev/null; then
                git commit -m "[AVASAM] Add final batch [skip ci]" --quiet 2>/dev/null || true

                local PUSH_RETRY=0
                while [ $PUSH_RETRY -lt 5 ]; do
                  PUSH_RETRY=$((PUSH_RETRY + 1))
                  if timeout 180 git push origin HEAD:"$BRANCH" 2>&1; then
                    echo "    Final batch pushed successfully!"
                    break
                  else
                    echo "    Push failed, attempt $PUSH_RETRY/5..."
                    sleep $((3 + RANDOM % 7))
                    git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                    git reset --hard origin/"$BRANCH" 2>/dev/null || true
                    mkdir -p downloads
                    cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
                    for BF in "${BATCH_FILES[@]}"; do
                      git add "$BF" 2>/dev/null || true
                    done
                    if ! git diff --cached --quiet 2>/dev/null; then
                      git commit -m "[AVASAM] Add final batch [skip ci]" --quiet 2>/dev/null || true
                    fi
                  fi
                done
              fi
            fi
          }

          # ============================================
          # MAIN INCREMENTAL PUSH LOGIC
          # ============================================

          echo ""
          echo "=========================================="
          echo "Starting incremental push process..."
          echo "=========================================="

          # First, sync with remote
          echo "Syncing with remote repository..."
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"

          # Create downloads directory and copy files
          mkdir -p downloads
          cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true

          # Generate list of files to push (sorted by size, smallest first)
          echo "Analyzing files to push..."
          ALL_FILES=()

          # First add README files (small)
          while IFS= read -r -d '' FILE; do
            ALL_FILES+=("$FILE")
          done < <(find downloads -name "README.md" -print0 2>/dev/null)

          # Updated glob to match .zip and split parts (.z01, .z02...) and other media files
          while IFS= read -r -d '' FILE; do
            ALL_FILES+=("$FILE")
          done < <(find downloads -type f \( -name "*.zip" -o -name "*.z[0-9][0-9]" -o -name "*.z[0-9]" -o -name "*.mp4" -o -name "*.mp3" -o -name "*.m4a" -o -name "*.exe" -o -name "*.iso" -o -name "*.tar*" -o -name "*.rar" \) -print0 2>/dev/null | sort -z)

          TOTAL_FILES=${#ALL_FILES[@]}
          echo "Found $TOTAL_FILES files to push"
          echo ""

          if [ $TOTAL_FILES -eq 0 ]; then
            # Still push READMEs if they exist
            git add README.md downloads/README.md 2>/dev/null || true
            if ! git diff --cached --quiet 2>/dev/null; then
              git commit -m "[AVASAM] Update README [skip ci]"
              timeout 120 git push origin HEAD:"$BRANCH" || true
            fi
            echo "No download files to push!"
            exit 0
          fi

          # Calculate total size
          TOTAL_SIZE=0
          for F in "${ALL_FILES[@]}"; do
            if [ -f "$F" ]; then
              FSIZE=$(stat -c%s "$F" 2>/dev/null || echo 0)
              TOTAL_SIZE=$((TOTAL_SIZE + FSIZE))
            fi
          done
          TOTAL_SIZE_MB=$((TOTAL_SIZE / 1024 / 1024))
          echo "Total size: ${TOTAL_SIZE_MB}MB"
          echo ""

          # Decide push strategy based on total size
          if [ $TOTAL_SIZE_MB -lt 100 ]; then
            echo "Small upload - pushing all at once..."

            git add -A downloads/
            git add README.md

            if ! git diff --cached --quiet; then
              git commit -m "[AVASAM] Downloaded files [skip ci]"

              PUSH_RETRY=0
              while [ $PUSH_RETRY -lt 10 ]; do
                PUSH_RETRY=$((PUSH_RETRY + 1))
                if timeout 300 git push origin HEAD:"$BRANCH"; then
                  echo "Push successful!"
                  break
                else
                  echo "Push failed, retry $PUSH_RETRY/10..."
                  sleep $((3 + RANDOM % 7))
                  git fetch origin "$BRANCH"
                  git reset --hard origin/"$BRANCH"
                  mkdir -p downloads
                  cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
                  git add -A downloads/
                  git add README.md
                  if ! git diff --cached --quiet; then
                    git commit -m "[AVASAM] Downloaded files [skip ci]"
                  fi
                fi
              done
            fi

          else
            echo "Large upload (${TOTAL_SIZE_MB}MB) - using incremental batch push..."
            echo ""

            # Push files in batches
            push_batch "${ALL_FILES[@]}"

            # Final push for master README
            echo ""
            echo "Pushing README files..."
            git fetch origin "$BRANCH" --quiet 2>/dev/null || true
            git reset --hard origin/"$BRANCH" 2>/dev/null || true
            mkdir -p downloads
            cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true

            regenerate_downloads_readme
            git add downloads/README.md
            git add README.md

            if ! git diff --cached --quiet 2>/dev/null; then
              git commit -m "[AVASAM] Update download list [skip ci]" --quiet 2>/dev/null || true

              PUSH_RETRY=0
              while [ $PUSH_RETRY -lt 5 ]; do
                PUSH_RETRY=$((PUSH_RETRY + 1))
                if timeout 60 git push origin HEAD:"$BRANCH" 2>&1; then
                  echo "README pushed!"
                  break
                else
                  echo "README push failed, retry $PUSH_RETRY/5..."
                  sleep 3
                fi
              done
            fi
          fi

          echo ""
          echo "=========================================="
          echo "All files pushed successfully!"
          echo "AVASAM (https://avasam.ir)"
          echo "=========================================="
